<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local AI</title>

    <link rel="stylesheet" href="/static/style.css">

    <!-- Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Highlight.js -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>

<body>

    <aside id="sidebar" aria-label="Conversations">
        <div id="sidebar-top">
            <button type="button" id="new-chat-btn">+ New Chat</button>
        </div>
        <div id="conversation-list" role="list"></div>
    </aside>

    <main id="main-container">
        <header id="topbar">
            <h2>Local AI</h2>
            <label>
                <span class="visually-hidden">Model</span>
                <select id="model-select" aria-label="Model"></select>
            </label>
        </header>
        <div id="chat-box" role="log" aria-live="polite" aria-relevant="additions"></div>
        <form id="input-area" onsubmit="return false;">
            <input type="text" id="user-input" placeholder="Ask anything..." autocomplete="off" />
            <button type="button" id="send-btn">Send</button>
        </form>
    </main>

    <script src="/static/script.js"></script>

</body>

</html>
