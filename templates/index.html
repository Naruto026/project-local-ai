<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local AI</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>

<body>

    <aside id="sidebar" aria-label="Conversations">
        <div id="sidebar-brand">
            <div class="brand-left">
                <span class="brand-icon">◆</span>
                <span class="brand-name">Local AI</span>
            </div>
            <button type="button" id="sidebar-close-btn" class="sidebar-close-btn" aria-label="Close sidebar">×</button>
        </div>
        <div id="sidebar-top">
            <button type="button" id="new-chat-btn">
                <span class="btn-icon">+</span> New chat
            </button>
            <button type="button" id="settings-btn" class="sidebar-secondary-btn" title="Settings">Settings</button>
        </div>
        <div class="sidebar-section-label">Chats</div>
        <div class="sidebar-search-wrap">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="sidebar-search" placeholder="Search chats..." autocomplete="off" aria-label="Search chats" />
        </div>
        <div id="conversation-list" role="list"></div>
    </aside>

    <div id="sidebar-overlay" class="sidebar-overlay" aria-hidden="true"></div>

    <main id="main-container">
        <header id="topbar">
            <div class="topbar-left">
                <button type="button" id="sidebar-toggle-btn" class="sidebar-toggle-btn" title="Toggle sidebar" aria-label="Toggle sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h2 id="chat-title">New chat</h2>
                <span id="status-pill" class="status-pill hidden" aria-live="polite"></span>
            </div>
            <div class="topbar-actions">
                <div class="model-wrap">
                    <label for="model-select" class="model-label">Model</label>
                    <select id="model-select" aria-label="Model"></select>
                </div>
            </div>
        </header>
        <div id="chat-scroll">
            <div id="chat-box" role="log" aria-live="polite" aria-relevant="additions">
                <div id="welcome-state" class="welcome-state">
                    <div class="welcome-logo">◆</div>
                    <h3>Welcome to Local AI</h3>
                    <p>Private, local AI powered by Ollama running on your machine.</p>
                    <div class="suggestion-chips-grid">
                        <button type="button" class="suggestion-chip" data-prompt="Write a clean Python script to scrape a website.">
                            <span class="chip-title">Code Scraping</span>
                            <span class="chip-subtitle">"Write a Python script to scrape..."</span>
                        </button>
                        <button type="button" class="suggestion-chip" data-prompt="Explain quantum computing in simple terms for a beginner.">
                            <span class="chip-title">Explain Concept</span>
                            <span class="chip-subtitle">"Explain quantum computing simply..."</span>
                        </button>
                        <button type="button" class="suggestion-chip" data-prompt="Draft a professional email requesting feedback on a software project.">
                            <span class="chip-title">Draft Email</span>
                            <span class="chip-subtitle">"Draft a professional email..."</span>
                        </button>
                        <button type="button" class="suggestion-chip" data-prompt="Help me brainstorm 5 unique ideas for a local database project.">
                            <span class="chip-title">Brainstorm Ideas</span>
                            <span class="chip-subtitle">"Brainstorm 5 project ideas..."</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div id="typing-indicator" class="typing-indicator hidden" aria-hidden="true">
            <span class="typing-dots"><span></span><span></span><span></span></span>
            <span>Generating</span>
        </div>
        <form id="input-area" class="composer" onsubmit="return false;">
            <div id="file-chips" class="file-chips"></div>
            <div id="file-actions" class="file-actions hidden">
                <button type="button" id="btn-summarize-files" class="file-action-btn">Summarize files</button>
                <button type="button" id="btn-ask-files" class="file-action-btn">Ask about files</button>
            </div>
            <div class="composer-inner">
                <input type="file" id="file-input" class="visually-hidden" multiple
                    accept=".pdf,.docx,.txt,.png,.jpg,.jpeg" />
                <button type="button" id="attach-btn" class="attach-btn" title="Attach files" aria-label="Attach files">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <textarea id="user-input" rows="1" placeholder="Message Local AI..." autocomplete="off"></textarea>
                <button type="button" id="send-btn" class="send-btn" title="Send" aria-label="Send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                </button>
            </div>
            <p class="composer-hint">Enter to send · Shift+Enter for new line · Up to 3 files (PDF, DOCX, TXT, images)</p>
        </form>
    </main>

    <div id="toast" class="toast hidden" role="status"></div>

    <!-- Settings panel -->
    <div id="settings-backdrop" class="panel-backdrop" aria-hidden="true"></div>
    <section id="settings-panel" class="settings-panel" aria-label="Settings">
        <header class="settings-header">
            <h3>Settings</h3>
            <button type="button" id="settings-close" class="icon-btn" aria-label="Close">×</button>
        </header>
        <form id="settings-form" class="settings-body">
            <fieldset>
                <legend>Model</legend>
                <label>Keep loaded (VRAM)
                    <select id="setting-keep-alive">
                        <option value="0">Unload immediately</option>
                        <option value="2m">2 minutes</option>
                        <option value="5m" selected>5 minutes</option>
                        <option value="30m">30 minutes</option>
                        <option value="-1">Keep in memory</option>
                    </select>
                </label>
                <label class="checkbox-row">
                    <input type="checkbox" id="setting-unload-switch" checked>
                    Unload other models when switching
                </label>
                <label>Temperature
                    <input type="range" id="setting-temperature" min="0" max="2" step="0.1" value="0.8">
                </label>
                <label>Context window
                    <input type="number" id="setting-num-ctx" min="512" max="131072" step="512" value="4096">
                </label>
            </fieldset>
            <fieldset>
                <legend>Memory</legend>
                <label class="checkbox-row">
                    <input type="checkbox" id="setting-memory-enabled" checked>
                    Use conversation memory
                </label>
                <label>Max messages in context
                    <input type="number" id="setting-max-messages" min="4" max="200" value="40">
                </label>
                <label class="checkbox-row">
                    <input type="checkbox" id="setting-summarize">
                    Auto-summarize when over threshold
                </label>
                <label>Summarize after (messages)
                    <input type="number" id="setting-summarize-threshold" min="8" max="100" value="24">
                </label>
                <div class="settings-actions-row">
                    <button type="button" id="btn-clear-memory" class="btn btn-ghost">Clear session memory</button>
                    <button type="button" id="btn-summarize-now" class="btn btn-ghost">Summarize now</button>
                    <button type="button" id="btn-export-chats" class="btn btn-ghost">Export all chats</button>
                </div>
            </fieldset>
            <fieldset>
                <legend>Chat</legend>
                <label>Custom instructions
                    <span class="field-hint">How the assistant should behave (not saved in chat history)</span>
                    <textarea id="setting-custom-instructions" rows="4" placeholder="e.g. Be concise. Use bullet points when helpful."></textarea>
                </label>
                <label>Stream UI refresh (ms)
                    <input type="number" id="setting-stream-delay" min="0" max="500" value="120">
                </label>
                <label>New chat greeting
                    <input type="text" id="setting-greeting" value="Hello! How can I assist you today?">
                </label>
            </fieldset>
            <fieldset>
                <legend>Appearance</legend>
                <label>Accent color
                    <input type="color" id="setting-accent" value="#10a37f">
                </label>
                <label>Chat Font Size
                    <select id="setting-font-size">
                        <option value="small">Small</option>
                        <option value="normal" selected>Normal</option>
                        <option value="large">Large</option>
                    </select>
                </label>
                <label class="checkbox-row">
                    <input type="checkbox" id="setting-compact">
                    Compact layout
                </label>
                <label class="checkbox-row">
                    <input type="checkbox" id="setting-animations" checked>
                    Enable animations
                </label>
            </fieldset>
            <footer class="settings-footer">
                <button type="submit" class="btn btn-primary">Save settings</button>
            </footer>
        </form>
    </section>

    <!-- Modal -->
    <div id="modal-backdrop" class="modal-backdrop" aria-hidden="true" role="dialog" aria-modal="true">
        <div class="modal-card">
            <h4 id="modal-title"></h4>
            <p id="modal-body"></p>
            <div id="modal-actions" class="modal-actions"></div>
        </div>
    </div>

    {% if open_settings %}
    <script>window.__OPEN_SETTINGS__ = true;</script>
    {% endif %}
    <script src="/static/modal.js"></script>
    <script src="/static/script.js"></script>
    <script src="/static/files.js"></script>
    <script src="/static/settings.js"></script>

</body>

</html>
